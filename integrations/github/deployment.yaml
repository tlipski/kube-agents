apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-token-minter
  namespace: agent-system
  labels:
    app: github-token-minter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-token-minter
  template:
    metadata:
      labels:
        app: github-token-minter
    spec:
      serviceAccountName: github-token-minter-ksa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: token-minter
          image: us-docker.pkg.dev/abcxyz-artifacts/docker-images/github-token-minter-server:v2.7.1-amd64
          imagePullPolicy: IfNotPresent
          command: ["/minty"]
          args: ["server", "run"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: CONFIGS_DIR
              value: "/etc/minty"
            - name: ISSUER_ALLOWLIST
              value: "https://container.googleapis.com/v1/projects/YOUR_PROJECT_ID/locations/YOUR_REGION/clusters/YOUR_CLUSTER"
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: github-app-credentials
                  key: app-id
            - name: KMS_KEY_NAME
              value: "projects/YOUR_PROJECT_ID/locations/YOUR_REGION/keyRings/YOUR_KEYRING/cryptoKeys/YOUR_KEY/cryptoKeyVersions/YOUR_KEY_VERSION"
            - name: SOURCE_SYSTEM_AUTH
              value: "gha://$(GITHUB_APP_ID)?kms_id=$(KMS_KEY_NAME)"
          livenessProbe:
            httpGet:
              path: /version
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /version
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: config-volume
              mountPath: /etc/minty/YOUR_GITHUB_ORG/YOUR_GITHUB_REPO.yaml
              subPath: YOUR_GITHUB_ORG-YOUR_GITHUB_REPO.yaml
      volumes:
        - name: config-volume
          configMap:
            name: github-token-minter-config
---
apiVersion: v1
kind: Service
metadata:
  name: github-token-minter
  namespace: agent-system
spec:
  selector:
    app: github-token-minter
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: github-token-minter-policy
  namespace: agent-system
spec:
  podSelector:
    matchLabels:
      app: github-token-minter
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: platform-agent
        - podSelector:
            matchLabels:
              app: devteam-agent
        - podSelector:
            matchLabels:
              app: operator-agent
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: node-local-dns
        - ipBlock:
            cidr: 169.254.20.10/32
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS outbound connection to GitHub and KMS APIs
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
