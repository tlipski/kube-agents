apiVersion: kubeagents.x-k8s.io/v1alpha1
kind: OperatorAgent
metadata:
  name: operator-agent-sample
  namespace: kubeagents-system
spec:
  harness:
    clusterName: "autopilot-cluster-1"
    location: "us-central1"
    projectId: "kube-agents-gkedemos"
    hermes:
      apiServerSecretRef:
        name: "platform-agent-secrets"
        key: "API_SERVER_KEY"
  deployment:
    image: "ghcr.io/gke-labs/kube-agents/operator-agent"
    tag: "latest"
  security:
    serviceAccountName: "kubeagents-operator-agent"
    serviceAccountAnnotations:
      iam.gke.io/gcp-service-account: "kubeagents-operator-gsa@kube-agents-gkedemos.iam.gserviceaccount.com"
    remoteIdentitySubject: "kubeagents-operator-gsa@kube-agents-gkedemos.iam.gserviceaccount.com"
