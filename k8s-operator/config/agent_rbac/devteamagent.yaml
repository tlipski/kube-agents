apiVersion: v1
kind: ServiceAccount
metadata:
  name: devteam-agent
  namespace: kubeagents-system
---
# ── Least-Privilege Namespace-Scoped K8s RBAC Roles for DevTeam Agent ──────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: kubeagents-system
  name: devteam-agent-role
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - pods/log
      - services
      - configmaps
      - secrets
      - events
      - persistentvolumeclaims
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: kubeagents-system
  name: devteam-agent-rolebinding
subjects:
  - kind: ServiceAccount
    name: devteam-agent
    namespace: kubeagents-system
roleRef:
  kind: Role
  name: devteam-agent-role
  apiGroup: rbac.authorization.k8s.io
