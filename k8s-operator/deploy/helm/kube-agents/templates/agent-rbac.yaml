---
# ==============================================================================
# 🤖 Operator Agent RBAC
# ==============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeagents-operator-agent
  namespace: {{ .Values.global.namespace }}
  {{- if .Values.agents.operator.gsaEmail }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.agents.operator.gsaEmail | quote }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: operator-agent-role
  namespace: {{ .Values.global.namespace }}
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - services
      - events
      - persistentvolumes
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: operator-agent-rolebinding
  namespace: {{ .Values.global.namespace }}
subjects:
  - kind: ServiceAccount
    name: kubeagents-operator-agent
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: operator-agent-role
  apiGroup: rbac.authorization.k8s.io
