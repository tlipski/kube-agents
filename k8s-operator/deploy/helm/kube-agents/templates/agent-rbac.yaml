# ==============================================================================
# 🤖 Platform Agent RBAC
# ==============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeagents-platform-agent
  namespace: {{ .Values.global.namespace }}
  {{- if .Values.agents.platform.gsaEmail }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.agents.platform.gsaEmail | quote }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-agent-role
  namespace: {{ .Values.global.namespace }}
rules:
  - apiGroups: ["container.cnrm.cloud.google.com"]
    resources: ["containerclusters"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - configmaps
      - persistentvolumeclaims
      - events
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kubeagents.x-k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: platform-agent-rolebinding
  namespace: {{ .Values.global.namespace }}
subjects:
  - kind: ServiceAccount
    name: kubeagents-platform-agent
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: platform-agent-role
  apiGroup: rbac.authorization.k8s.io

---
