apiVersion: v1
kind: Secret
metadata:
  name: platform-agent-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
data:
  GEMINI_API_KEY: {{ .Values.keys.geminiApiKey | b64enc }}
  OPENAI_API_KEY: {{ .Values.keys.openaiApiKey | b64enc }}
  ANTHROPIC_API_KEY: {{ .Values.keys.anthropicApiKey | b64enc }}
  API_SERVER_KEY: {{ .Values.keys.apiServerKey | b64enc }}

{{- if .Values.githubMinter.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: github-app-credentials
  namespace: {{ .Values.global.namespace }}
type: Opaque
data:
  app-id: {{ required "githubMinter.githubAppId is required when enabled" .Values.githubMinter.githubAppId | b64enc }}
{{- end }}
