apiVersion: v1
kind: Secret
metadata:
  name: platform-agent-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
data:
  GEMINI_API_KEY: {{ .Values.keys.geminiApiKey | b64enc }}
  OPENAI_API_KEY: {{ .Values.keys.openaiApiKey | b64enc }}
  ANTHROPIC_API_KEY: {{ .Values.keys.anthropicApiKey | b64enc }}
  API_SERVER_KEY: {{ .Values.keys.apiServerKey | b64enc }}
