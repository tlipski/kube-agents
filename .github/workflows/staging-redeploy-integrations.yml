name: Staging Redeploy Integrations

on:
  push:
    branches:
      - main
    paths:
      - "k8s-operator/config/integrations/**"
      - "k8s-operator/scripts/provision_08_deploy_litellm.sh"
      - "k8s-operator/scripts/provision_09_deploy_github_minter.sh"
      - "k8s-operator/Makefile"
  workflow_dispatch:
    inputs:
      deploy_litellm:
        description: "Redeploy LiteLLM Integration"
        type: boolean
        default: true
      deploy_github:
        description: "Redeploy GitHub Minter Integration"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: github.repository == 'gke-labs/kube-agents'
    outputs:
      litellm: ${{ steps.set-targets.outputs.litellm }}
      github: ${{ steps.set-targets.outputs.github }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            litellm:
              - 'k8s-operator/config/integrations/litellm/**'
              - 'k8s-operator/scripts/provision_08_deploy_litellm.sh'
              - 'k8s-operator/Makefile'
            github:
              - 'k8s-operator/config/integrations/github/**'
              - 'k8s-operator/scripts/provision_09_deploy_github_minter.sh'
              - 'k8s-operator/Makefile'

      - name: Determine target deployments
        id: set-targets
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "litellm=${{ github.event.inputs.deploy_litellm }}" >> "$GITHUB_OUTPUT"
            echo "github=${{ github.event.inputs.deploy_github }}" >> "$GITHUB_OUTPUT"
          else
            echo "litellm=${{ steps.filter.outputs.litellm }}" >> "$GITHUB_OUTPUT"
            echo "github=${{ steps.filter.outputs.github }}" >> "$GITHUB_OUTPUT"
          fi

  provision-secrets:
    name: Provision Kubernetes Secrets
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.litellm == 'true' || needs.detect-changes.outputs.github == 'true' }}
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: staging-redeploy-secrets
      cancel-in-progress: true
    env:
      NAMESPACE: ${{ vars.NAMESPACE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "k8s-operator/go.mod"

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v3
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to GKE
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Perform Secrets Provisioning
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
          MODEL_PROVIDER: ${{ vars.MODEL_PROVIDER }}
          MODEL_DEFAULT_NAME: ${{ vars.MODEL_DEFAULT_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_SERVER_KEY: ${{ secrets.API_SERVER_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
        run: |
          echo "Provisioning secrets via provision_06"
          cd k8s-operator
          make gcp-provision-06-secrets ARGS="--no-confirm"

  deploy-litellm:
    name: Redeploy LiteLLM Gateway Integration
    needs: [detect-changes, provision-secrets]
    if: ${{ needs.detect-changes.outputs.litellm == 'true' }}
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: staging-redeploy-litellm
      cancel-in-progress: true
    env:
      NAMESPACE: ${{ vars.NAMESPACE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "k8s-operator/go.mod"

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v3
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to GKE
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Perform LiteLLM Redeployment
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
          MODEL_PROVIDER: ${{ vars.MODEL_PROVIDER }}
          MODEL_DEFAULT_NAME: ${{ vars.MODEL_DEFAULT_NAME }}
        run: |
          echo "Redeploying LiteLLM gateway via provision_08"
          cd k8s-operator
          make gcp-provision-08-litellm ARGS="--no-confirm"

      - name: Verify LiteLLM Deployment Rollout
        run: |
          echo "Waiting for rollout of LiteLLM deployment..."
          if ! kubectl rollout status deployment/litellm -n ${{ env.NAMESPACE }} --timeout=180s; then
            echo "::error::Rollout failed! Printing debug logs..."
            kubectl describe deployment/litellm -n ${{ env.NAMESPACE }} || true
            kubectl get pods -n ${{ env.NAMESPACE }} -l app=litellm || true
            kubectl describe pods -n ${{ env.NAMESPACE }} -l app=litellm || true
            kubectl logs -n ${{ env.NAMESPACE }} -l app=litellm --all-containers --tail=50 || true
            exit 1
          fi

  check-github-config:
    name: Check GitHub Minter Configuration
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.github == 'true' }}
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      configured: ${{ steps.check_vars.outputs.configured }}
    steps:
      - name: Check GitHub Variables
        id: check_vars
        env:
          GH_ORG: ${{ vars.GH_ORG }}
          GH_REPO: ${{ vars.GH_REPO }}
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
        run: |
          missing=()
          for var in GH_ORG GH_REPO GH_APP_ID; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ GitHub Token Minter deployment will be skipped because required repository variables are not configured: ${missing[*]}"
            echo "::notice title=GitHub Minter Skipped::GitHub Token Minter files changed, but deployment will be skipped because required repository variables are not configured: ${missing[*]}"
            echo "### ⚠️ GitHub Token Minter Deployment Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Changes were detected in GitHub Token Minter files, but the deployment job will be skipped because the following required repository variables are not configured:" >> "$GITHUB_STEP_SUMMARY"
            for var in "${missing[@]}"; do
              echo "- \`$var\`" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✅ All required repository variables (GH_ORG, GH_REPO, GH_APP_ID) for GitHub Token Minter deployment are set. Proceeding with deployment."
            echo "### ✅ GitHub Token Minter Configured" >> "$GITHUB_STEP_SUMMARY"
            echo "All required repository variables (GH_ORG, GH_REPO, GH_APP_ID) for GitHub Token Minter deployment are set." >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-github:
    name: Redeploy GitHub Token Minter Integration
    needs: [detect-changes, provision-secrets, check-github-config]
    if: ${{ needs.detect-changes.outputs.github == 'true' && needs.check-github-config.outputs.configured == 'true' }}
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: staging-redeploy-github
      cancel-in-progress: true
    env:
      GITHUB_PEM_PATH: "/tmp/github_app_pem_path"
      NAMESPACE: ${{ vars.NAMESPACE }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "k8s-operator/go.mod"

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v3
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to GKE
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Create GitHub Private Key PEM File
        env:
          PEM_SECRET: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          if [ -n "$PEM_SECRET" ]; then
            echo "$PEM_SECRET" > "$GITHUB_PEM_PATH"
            chmod 600 "$GITHUB_PEM_PATH"
          else
            echo "::warning::No GitHub private key secret found."
          fi

      - name: Perform GitHub Token Minter Redeployment
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
        run: |
          echo "Redeploying GitHub Token Minter via provision_09"
          cd k8s-operator
          make gcp-provision-09-github ARGS="--no-confirm"

      - name: Verify GitHub Token Minter Deployment Rollout
        run: |
          echo "Waiting for rollout of github-token-minter deployment..."
          if ! kubectl rollout status deployment/github-token-minter -n ${{ env.NAMESPACE }} --timeout=180s; then
            echo "::error::Rollout failed! Printing debug logs..."
            kubectl describe deployment/github-token-minter -n ${{ env.NAMESPACE }} || true
            kubectl get pods -n ${{ env.NAMESPACE }} -l app=github-token-minter || true
            kubectl describe pods -n ${{ env.NAMESPACE }} -l app=github-token-minter || true
            kubectl logs -n ${{ env.NAMESPACE }} -l app=github-token-minter --all-containers --tail=50 || true
            exit 1
          fi
